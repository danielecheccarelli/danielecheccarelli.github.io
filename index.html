<style>
:root{
--bg:#ffffff;--text:#1b1f23;--muted:#5f6b76;
--primary:#1b6eea;--primary-700:#1559be;--surface:#f6f8fa;--border:#e5e7eb;
--shadow:0 4px 20px rgba(0,0,0,0.06)
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;color:var(--text);background:var(--bg);line-height:1.6}
.container{max-width:1000px;margin:0 auto;padding:0 20px}
.skip-link{position:absolute;left:-9999px}.skip-link:focus{left:16px;top:16px;background:#000;color:#fff;padding:8px 12px;border-radius:6px;z-index:1000}
/* Header */
.site-header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);z-index:10}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.brand-title{display:block;font-weight:700}
.brand-subtitle{display:block;color:var(--muted);font-size:0.95rem}
.nav{list-style:none;margin:0;padding:0;display:flex;gap:18px}
.nav a{text-decoration:none;color:var(--text)}
.nav a:hover{color:var(--primary)}
/* Hero */
.hero{background:linear-gradient(135deg,#eaf2ff 0%,#ffffff 60%);padding:56px 0 40px;border-bottom:1px solid var(--border)}
.hero h1{font-size:2rem;margin:0 0 10px}
.lead{font-size:1.1rem;color:var(--muted);max-width:800px}
/* Sections */
.section{padding:44px 0}
.section.alt{background:var(--surface)}
h2{margin:0 0 14px;font-size:1.5rem}
.check{padding-left:18px}
.check li{margin:8px 0}
/* Cards */
.cards{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
.card{grid-column:span 12;background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.card h3{margin:0 0 6px}
.place{color:var(--muted);margin:0 0 10px}
.link{color:var(--primary);text-decoration:none}
.link:hover{text-decoration:underline}
/* Legal & footer */
.legal .small{font-size:0.9rem;color:var(--muted)}
.site-footer{border-top:1px solid var(--border);padding:16px 0;background:#fff}
.site-footer p{margin:0;color:var(--muted)}
/* Immagini responsive */
img{max-width:100%;height:auto}
/* Evita che le ancore finiscano sotto l’header sticky */
section[id], h2 { scroll-margin-top: 80px; }
/* Header mobile: evita sovrapposizioni */
html { -webkit-text-size-adjust: 100%; }
